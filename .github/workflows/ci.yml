name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Check Python syntax
      run: |
        python -m py_compile src/dataloader/data_loader.py src/__init__.py
        python -m py_compile src/eda/*.py
        python -m py_compile src/tsm/*.py
        python -m py_compile examples/*.py

    - name: Lint with flake8 (optional warnings)
      run: |
        pip install flake8
        flake8 src/ --count --statistics --show-source || true

    - name: Run unit tests (when available)
      run: |
        pip install pytest pytest-cov
        pytest tests/ --maxfail=1 --disable-warnings -q || echo "No tests directory yet"
